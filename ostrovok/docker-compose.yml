services:
  postgres:
    image: postgres:16-alpine
    container_name: ostrovok_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGPORT: ${POSTGRES_PORT}
      DEBEZIUM_USER: ${DEBEZIUM_USER}
      DEBEZIUM_PASSWORD: ${DEBEZIUM_PASSWORD}
      DEBEZIUM_PUBLICATION: ${DEBEZIUM_PUBLICATION}
    command:
      - postgres
      - -c
      - wal_level=logical
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
      - -c
      - max_logical_replication_workers=10
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -p ${POSTGRES_PORT}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ostrovok

  debezium-connect:
    image: quay.io/debezium/connect:3.0
    container_name: ostrovok_debezium_connect
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      GROUP_ID: ${DEBEZIUM_GROUP_ID}
      CONFIG_STORAGE_TOPIC: ${DEBEZIUM_CONFIG_TOPIC}
      OFFSET_STORAGE_TOPIC: ${DEBEZIUM_OFFSET_TOPIC}
      STATUS_STORAGE_TOPIC: ${DEBEZIUM_STATUS_TOPIC}
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_REST_ADVERTISED_HOST_NAME: debezium-connect
      CONNECT_PRODUCER_MAX_REQUEST_SIZE: 16777216
      CONNECT_PRODUCER_BUFFER_MEMORY: 67108864
      KAFKA_HEAP_OPTS: ${DEBEZIUM_HEAP_OPTS:--Xms1g -Xmx6g}
    ports:
      - "${DEBEZIUM_CONNECT_PORT:-8083}:8083"
    networks:
      - ostrovok
      - staybook-network

  debezium-init:
    image: curlimages/curl:8.12.1
    container_name: ostrovok_debezium_init
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      debezium-connect:
        condition: service_started
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT}
      DEBEZIUM_USER: ${DEBEZIUM_USER}
      DEBEZIUM_PASSWORD: ${DEBEZIUM_PASSWORD}
      DEBEZIUM_SLOT_NAME: ${DEBEZIUM_SLOT_NAME}
      DEBEZIUM_PUBLICATION: ${DEBEZIUM_PUBLICATION}
      DEBEZIUM_TOPIC_PREFIX: ${DEBEZIUM_TOPIC_PREFIX}
      DEBEZIUM_CONNECTOR_NAME: ${DEBEZIUM_CONNECTOR_NAME}
    volumes:
      - ./debezium/register-connector.sh:/register-connector.sh:ro
    entrypoint: ["/bin/sh", "/register-connector.sh"]
    networks:
      - ostrovok

  ostrovok-import-service:
    build: .
    container_name: ostrovok_app
    restart: "no"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable
      DUMPS_DIR: /data
      BATCH_SIZE: ${BATCH_SIZE}
      MAX_LINE_SIZE: ${MAX_LINE_SIZE:-16777216}
    volumes:
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ostrovok

volumes:
  postgres_data:

networks:
  ostrovok:
    driver: bridge
  staybook-network:
    external: true
